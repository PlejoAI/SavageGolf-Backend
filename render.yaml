services:
  - type: web
    name: savage-golf-api
    env: python
    buildCommand: "python3 -m pip install --upgrade pip wheel && python3 -m pip install fastapi uvicorn google-generativeai python-multipart python-dotenv stripe requests opencv-python-headless mediapipe numpy --no-cache-dir"
    startCommand: "python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
